<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>For vaishnavi ji 🌸🦋💫</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
:root {
  --rose: #ff6b9d;
  --rose-soft: #ffb3ce;
  --lavender: #c084fc;
  --gold: #fbbf24;
  --cream: #fff1f5;
  --deep: #0c0612;
  --mid: #1a0d2e;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--deep);
  font-family: 'DM Sans', sans-serif;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}

/* ═══ WELCOME SCREEN ═══ */
#screen-welcome {
  position: fixed; inset: 0; z-index: 20;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: clamp(1.5rem, 5vw, 4rem);
  background: var(--deep);
  will-change: opacity;
  transition: opacity 1s cubic-bezier(.4,0,.2,1), transform 1s cubic-bezier(.4,0,.2,1);
}
#screen-welcome.out {
  opacity: 0; transform: scale(1.05); pointer-events: none;
}

/* aurora bg */
.aurora {
  position: absolute; inset: -50%;
  background:
    radial-gradient(ellipse 80% 60% at 20% 50%, rgba(192,132,252,.18) 0%, transparent 60%),
    radial-gradient(ellipse 70% 50% at 80% 40%, rgba(255,107,157,.14) 0%, transparent 55%),
    radial-gradient(ellipse 60% 80% at 50% 90%, rgba(251,191,36,.08) 0%, transparent 50%);
  animation: drift 12s ease-in-out infinite alternate;
  pointer-events: none;
}
@keyframes drift {
  0%   { transform: translate(0,0) rotate(0deg); }
  33%  { transform: translate(2%,1%) rotate(1deg); }
  66%  { transform: translate(-1%,2%) rotate(-1deg); }
  100% { transform: translate(1%,-1%) rotate(.5deg); }
}

/* particle canvas behind text */
#particle-bg { position: absolute; inset: 0; pointer-events: none; opacity: .6; }

.w-eyebrow {
  font-family: 'DM Sans', sans-serif;
  font-weight: 200;
  font-size: clamp(.65rem, 1.8vw, .8rem);
  letter-spacing: .35em;
  text-transform: uppercase;
  color: var(--rose-soft);
  margin-bottom: clamp(1rem, 3vw, 1.8rem);
  opacity: 0; transform: translateY(16px);
  animation: up .8s .4s cubic-bezier(.2,0,0,1) forwards;
}

.w-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(2.4rem, 7vw, 5.2rem);
  line-height: 1.12;
  color: #fff;
  letter-spacing: -.01em;
  margin-bottom: clamp(.8rem, 2vw, 1.2rem);
  opacity: 0; transform: translateY(20px);
  animation: up .9s .7s cubic-bezier(.2,0,0,1) forwards;
}
.w-title em {
  font-style: italic;
  background: linear-gradient(135deg, var(--rose), var(--lavender));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.w-body {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(1rem, 2.5vw, 1.25rem);
  color: rgba(255,230,240,.65);
  max-width: 420px;
  line-height: 1.75;
  margin-bottom: clamp(2rem, 5vw, 3rem);
  opacity: 0; transform: translateY(18px);
  animation: up .9s 1s cubic-bezier(.2,0,0,1) forwards;
}

.w-btn {
  opacity: 0; transform: translateY(14px);
  animation: up .8s 1.3s cubic-bezier(.2,0,0,1) forwards;
  position: relative;
  background: none; border: none;
  cursor: pointer;
  padding: 0;
}
.w-btn-inner {
  display: flex; align-items: center; gap: .7rem;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,107,157,.35);
  color: var(--rose-soft);
  font-family: 'DM Sans', sans-serif;
  font-size: clamp(.8rem, 2vw, .9rem);
  font-weight: 300;
  letter-spacing: .18em;
  text-transform: uppercase;
  padding: clamp(.75rem,2vw,.95rem) clamp(1.6rem,4vw,2.4rem);
  border-radius: 100px;
  transition: background .35s, border-color .35s, color .35s, transform .25s, box-shadow .35s;
  backdrop-filter: blur(8px);
}
.w-btn:hover .w-btn-inner {
  background: rgba(255,107,157,.15);
  border-color: rgba(255,107,157,.7);
  color: #fff;
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(255,107,157,.2);
}
.w-btn:active .w-btn-inner { transform: translateY(0) scale(.98); }
.btn-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--rose);
  box-shadow: 0 0 8px var(--rose);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: .5; transform: scale(.7); }
}

@keyframes up {
  to { opacity: 1; transform: translateY(0); }
}

/* ═══ GARDEN SCREEN ═══ */
#screen-garden {
  position: fixed; inset: 0; z-index: 10;
  opacity: 0; pointer-events: none;
  transition: opacity 1.2s cubic-bezier(.4,0,.2,1);
}
#screen-garden.in { opacity: 1; pointer-events: all; }

#gc { display: block; width: 100%; height: 100%; touch-action: none; cursor: crosshair; }

/* HUD */
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: center;
  padding: clamp(.8rem,3vw,1.4rem) 1.5rem;
  pointer-events: none;
  opacity: 0; transform: translateY(-10px);
  transition: opacity .9s 1.5s ease, transform .9s 1.5s ease;
}
.hud.show { opacity: 1; transform: translateY(0); }
.hud-pill {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(.95rem,2.5vw,1.2rem);
  color: rgba(255,230,240,.8);
  background: rgba(12,6,18,.55);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,107,157,.2);
  padding: .4rem 1.4rem;
  border-radius: 100px;
  letter-spacing: .02em;
}

.toast {
  position: fixed; bottom: clamp(1.2rem,4vw,2rem); left: 50%;
  transform: translateX(-50%) translateY(0);
  font-family: 'DM Sans', sans-serif;
  font-size: clamp(.7rem,2vw,.8rem);
  font-weight: 200;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: rgba(255,200,220,.7);
  background: rgba(12,6,18,.6);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,107,157,.15);
  padding: .55rem 1.8rem;
  border-radius: 100px;
  pointer-events: none;
  opacity: 0;
  transition: opacity .6s ease, transform .6s ease;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

/* counter badge */
.counter {
  position: fixed; top: clamp(.8rem,3vw,1.4rem); right: clamp(.8rem,3vw,1.6rem);
  font-family: 'DM Sans', sans-serif;
  font-size: .72rem; font-weight: 300;
  letter-spacing: .12em; text-transform: uppercase;
  color: rgba(255,180,210,.5);
  pointer-events: none;
  opacity: 0; transition: opacity .6s 2s ease;
  display: flex; align-items: center; gap: .5rem;
}
.counter.show { opacity: 1; }
#bloom-count { color: var(--rose-soft); font-weight: 400; }
</style>
</head>
<body>

<!-- WELCOME -->
<section id="screen-welcome">
  <div class="aurora"></div>
  <canvas id="particle-bg"></canvas>

  <div class="w-eyebrow">A gift, just for you</div>
  <h1 class="w-title">I couldn't get you<br><em>flowers in real life</em></h1>
  <p class="w-body">So here is your garden — every petal grown from a thought of you. Tap anywhere and watch it bloom.</p>

  <button class="w-btn" id="enter-btn">
    <div class="w-btn-inner">
      <span class="btn-dot"></span>
      Enter the garden
    </div>
  </button>
</section>

<!-- GARDEN -->
<section id="screen-garden">
  <canvas id="gc"></canvas>
  <div class="hud" id="hud">
    <div class="hud-pill">Your garden, vaishnavi ji 🌸🦋💫 ✦</div>
  </div>
  <div class="toast" id="toast">Touch anywhere to grow flowers</div>
  <div class="counter" id="counter">
    <span id="bloom-count">0</span> blooms
  </div>
</section>

<script>
/* ══════════════════════════════════════════
   PARTICLE BACKGROUND (welcome screen)
══════════════════════════════════════════ */
(function() {
  const c = document.getElementById('particle-bg');
  const cx = c.getContext('2d');
  let W, H, pts = [];
  function resize() {
    W = c.width = c.offsetWidth;
    H = c.height = c.offsetHeight;
  }
  function init() {
    resize();
    pts = [];
    const n = Math.min(60, Math.floor(W * H / 14000));
    for (let i = 0; i < n; i++) pts.push({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-.5)*.25, vy: (Math.random()-.5)*.25,
      r: Math.random()*1.8+.4,
      a: Math.random()*.5+.15,
      hue: Math.random() > .5 ? 340 : 280
    });
  }
  function tick() {
    cx.clearRect(0,0,W,H);
    for (const p of pts) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      cx.beginPath();
      cx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      cx.fillStyle = `hsla(${p.hue},90%,80%,${p.a})`;
      cx.fill();
    }
    requestAnimationFrame(tick);
  }
  window.addEventListener('resize', () => { resize(); init(); });
  init(); tick();
})();

/* ══════════════════════════════════════════
   TRANSITION
══════════════════════════════════════════ */
document.getElementById('enter-btn').addEventListener('click', () => {
  document.getElementById('screen-welcome').classList.add('out');
  setTimeout(() => {
    document.getElementById('screen-welcome').style.display = 'none';
    initGarden();
    document.getElementById('screen-garden').classList.add('in');
    setTimeout(() => {
      document.getElementById('hud').classList.add('show');
      document.getElementById('counter').classList.add('show');
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3500);
    }, 900);
  }, 1000);
});

/* ══════════════════════════════════════════
   GARDEN ENGINE  — optimised object pool
══════════════════════════════════════════ */
function initGarden() {
  const cv = document.getElementById('gc');
  const ctx = cv.getContext('2d', { alpha: false });
  let W, H, raf;
  let bloomCount = 0;
  const bloomEl = document.getElementById('bloom-count');

  // ── OBJECT POOL ──
  const POOL_SIZE = 220;
  const pool = [];
  for (let i = 0; i < POOL_SIZE; i++) pool.push(makeFlower());
  let live = []; // active flowers

  // ── COLOR PALETTES (pre-computed) ──
  const PALETTES = [
    { p: '#ff6b9d', c: '#ffb3ce', m: '#ffd6e8' }, // rose
    { p: '#c084fc', c: '#e9d5ff', m: '#f3e8ff' }, // lavender
    { p: '#fb923c', c: '#fed7aa', m: '#fff7ed' }, // orange
    { p: '#34d399', c: '#a7f3d0', m: '#d1fae5' }, // mint
    { p: '#60a5fa', c: '#bfdbfe', m: '#eff6ff' }, // sky
    { p: '#f472b6', c: '#fbcfe8', m: '#fce7f3' }, // pink
    { p: '#fbbf24', c: '#fde68a', m: '#fef9c3' }, // gold
    { p: '#a78bfa', c: '#ddd6fe', m: '#ede9fe' }, // violet
  ];

  function makeFlower() {
    return {
      alive: false, x: 0, y: 0,
      size: 0, maxSize: 0,
      stemH: 0, stemCurve: 0,
      petalN: 0, type: 0,
      rot: 0, rotSpeed: 0,
      sway: 0, swaySpeed: 0, swayAmp: 0,
      age: 0, maxAge: 0,
      alpha: 0, growSpeed: 0,
      pal: null,
      state: 'grow', // grow | live | fade
    };
  }

  function spawnFlower(x, y, opts = {}) {
    let f = pool.find(p => !p.alive);
    if (!f) { f = makeFlower(); pool.push(f); }

    f.alive = true;
    f.x = x; f.y = y;
    f.maxSize = opts.size || (rand(20, 42));
    f.size = 0;
    f.stemH = opts.stemH || rand(35, 85);
    f.stemCurve = (Math.random() - .5) * 30;
    f.petalN = Math.floor(rand(5, 10));
    f.type = opts.type !== undefined ? opts.type : Math.floor(Math.random() * 4);
    f.rot = Math.random() * Math.PI * 2;
    f.rotSpeed = (Math.random() - .5) * .006;
    f.sway = Math.random() * Math.PI * 2;
    f.swaySpeed = rand(.008, .022);
    f.swayAmp = rand(2, 6);
    f.age = 0;
    f.maxAge = opts.maxAge || rand(380, 700);
    f.alpha = 0;
    f.growSpeed = rand(.04, .07);
    f.pal = PALETTES[Math.floor(Math.random() * PALETTES.length)];
    f.state = 'grow';
    live.push(f);
  }

  function rand(a, b) { return a + Math.random() * (b - a); }

  // ── RESIZE ──
  function resize() {
    W = cv.width = cv.offsetWidth;
    H = cv.height = cv.offsetHeight;
  }
  resize();
  const ro = new ResizeObserver(resize);
  ro.observe(cv);

  // ── BACKGROUND (static layer — drawn once to offscreen canvas) ──
  let bgCanvas = document.createElement('canvas');
  let bgCtx = bgCanvas.getContext('2d');

  function buildBg() {
    bgCanvas.width = W; bgCanvas.height = H;
    const g = bgCtx.createRadialGradient(W/2, H*.4, 0, W/2, H*.5, H*1.1);
    g.addColorStop(0, '#1e0a34');
    g.addColorStop(.45, '#120826');
    g.addColorStop(1, '#080412');
    bgCtx.fillStyle = g; bgCtx.fillRect(0,0,W,H);

    // ground
    const gr = bgCtx.createLinearGradient(0, H*.68, 0, H);
    gr.addColorStop(0, 'rgba(16,30,12,0)');
    gr.addColorStop(1, 'rgba(8,20,6,.8)');
    bgCtx.fillStyle = gr; bgCtx.fillRect(0, H*.68, W, H*.32);

    // horizon glow
    const hg = bgCtx.createRadialGradient(W/2, H*.72, 0, W/2, H*.72, W*.6);
    hg.addColorStop(0, 'rgba(255,107,157,.06)');
    hg.addColorStop(1, 'transparent');
    bgCtx.fillStyle = hg; bgCtx.fillRect(0, H*.5, W, H*.5);

    // stars
    for (let i = 0; i < 220; i++) {
      const sx = Math.random()*W, sy = Math.random()*H*.7;
      const sr = Math.random()*1.4+.2;
      bgCtx.globalAlpha = Math.random()*.55+.1;
      bgCtx.beginPath(); bgCtx.arc(sx, sy, sr, 0, Math.PI*2);
      bgCtx.fillStyle = '#fff'; bgCtx.fill();
    }
    // a few larger glowing stars
    bgCtx.globalAlpha = 1;
    for (let i = 0; i < 12; i++) {
      const sx = Math.random()*W, sy = Math.random()*H*.65;
      const sg = bgCtx.createRadialGradient(sx,sy,0,sx,sy,4);
      sg.addColorStop(0,'rgba(255,255,255,.9)'); sg.addColorStop(1,'transparent');
      bgCtx.fillStyle = sg; bgCtx.beginPath(); bgCtx.arc(sx,sy,4,0,Math.PI*2); bgCtx.fill();
    }
    bgCtx.globalAlpha = 1;
  }
  buildBg();
  window.addEventListener('resize', () => { resize(); buildBg(); live = []; spawnAmbient(); });

  // ── DRAW FLOWER (pure canvas, no save/restore loops) ──
  function drawFlower(f) {
    const alpha = f.alpha;
    if (alpha <= 0) return;

    const swayX = Math.sin(f.sway) * f.swayAmp;
    const fx = f.x + swayX, fy = f.y - f.stemH;
    const s = f.size;

    ctx.save();
    ctx.globalAlpha = alpha;

    // stem
    ctx.strokeStyle = '#3d7a4a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(f.x, f.y);
    ctx.quadraticCurveTo(f.x + f.stemCurve + swayX*.6, f.y - f.stemH*.55, fx, fy);
    ctx.stroke();

    // leaf (only if stem tall enough)
    if (f.stemH > 45 && s > 6) {
      const lx = f.x + f.stemCurve*.4 + swayX*.3;
      const ly = f.y - f.stemH*.42;
      ctx.save();
      ctx.translate(lx, ly);
      ctx.rotate(.5 + Math.sin(f.sway)*.04);
      ctx.fillStyle = '#4a8c55';
      ctx.beginPath();
      ctx.ellipse(9, -3, 12, 5, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    // flower head
    ctx.translate(fx, fy);
    ctx.rotate(f.rot);

    // soft glow behind petals
    if (s > 4) {
      const gRad = s * 2;
      const glow = ctx.createRadialGradient(0,0,0,0,0,gRad);
      glow.addColorStop(0, hexA(f.pal.p, .18));
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(0, 0, gRad, 0, Math.PI*2); ctx.fill();
    }

    // petals
    if (f.type === 0) drawRound(ctx, s, f.pal, f.petalN);
    else if (f.type === 1) drawPointed(ctx, s, f.pal, f.petalN);
    else if (f.type === 2) drawDaisy(ctx, s, f.pal, f.petalN);
    else drawCherry(ctx, s, f.pal, f.petalN);

    ctx.restore();
  }

  function drawRound(ctx, s, pal, n) {
    for (let i = 0; i < n; i++) {
      ctx.save();
      ctx.rotate((i/n)*Math.PI*2);
      ctx.fillStyle = pal.c;
      ctx.beginPath();
      ctx.ellipse(0, -s*.72, s*.34, s*.52, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    // inner petal highlight
    for (let i = 0; i < n; i++) {
      ctx.save();
      ctx.rotate((i/n)*Math.PI*2 + .1);
      ctx.fillStyle = pal.m;
      ctx.globalAlpha *= .45;
      ctx.beginPath();
      ctx.ellipse(0, -s*.65, s*.16, s*.28, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle = '#fef08a';
    ctx.beginPath(); ctx.arc(0,0,s*.3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath(); ctx.arc(0,0,s*.18,0,Math.PI*2); ctx.fill();
  }

  function drawPointed(ctx, s, pal, n) {
    ctx.fillStyle = pal.p;
    for (let i = 0; i < n; i++) {
      ctx.save();
      ctx.rotate((i/n)*Math.PI*2);
      ctx.beginPath();
      ctx.moveTo(0, -s*.18);
      ctx.bezierCurveTo(s*.28, -s*.32, s*.22, -s*1.02, 0, -s*1.12);
      ctx.bezierCurveTo(-s*.22, -s*1.02, -s*.28, -s*.32, 0, -s*.18);
      ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle = pal.m;
    ctx.globalAlpha *= .4;
    for (let i = 0; i < n; i++) {
      ctx.save();
      ctx.rotate((i/n)*Math.PI*2+.12);
      ctx.beginPath();
      ctx.moveTo(0,-s*.2); ctx.bezierCurveTo(s*.1,-s*.4,s*.08,-s*.9,0,-s*1);
      ctx.bezierCurveTo(-s*.08,-s*.9,-s*.1,-s*.4,0,-s*.2); ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1; // reset handled by outer save
    ctx.fillStyle = '#fef9c3';
    ctx.beginPath(); ctx.arc(0,0,s*.22,0,Math.PI*2); ctx.fill();
  }

  function drawDaisy(ctx, s, pal, n) {
    const total = n + 4;
    for (let i = 0; i < total; i++) {
      ctx.save();
      ctx.rotate((i/total)*Math.PI*2);
      ctx.fillStyle = i % 2 === 0 ? pal.p : pal.c;
      ctx.beginPath();
      ctx.ellipse(0, -s*.7, s*.18, s*.48, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle = '#fde68a';
    ctx.beginPath(); ctx.arc(0,0,s*.34,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath(); ctx.arc(0,0,s*.2,0,Math.PI*2); ctx.fill();
    // tiny dots on center
    ctx.fillStyle = 'rgba(120,60,0,.4)';
    for (let i = 0; i < 8; i++) {
      const a = (i/8)*Math.PI*2, r = s*.24;
      ctx.beginPath(); ctx.arc(Math.cos(a)*r, Math.sin(a)*r, 1.2, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawCherry(ctx, s, pal, n) {
    for (let i = 0; i < n; i++) {
      ctx.save();
      ctx.rotate((i/n)*Math.PI*2);
      ctx.fillStyle = pal.c;
      ctx.beginPath();
      ctx.moveTo(0,-s*.18);
      ctx.bezierCurveTo(s*.34,-s*.3, s*.4,-s*.82, 0,-s*1);
      ctx.bezierCurveTo(-s*.4,-s*.82,-s*.34,-s*.3, 0,-s*.18);
      ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle = pal.m;
    ctx.globalAlpha *= .5;
    for (let i = 0; i < n; i++) {
      ctx.save();
      ctx.rotate((i/n)*Math.PI*2+.15);
      ctx.beginPath();
      ctx.moveTo(0,-s*.2);
      ctx.bezierCurveTo(s*.12,-s*.3,s*.14,-s*.7,0,-s*.88);
      ctx.bezierCurveTo(-s*.14,-s*.7,-s*.12,-s*.3,0,-s*.2);
      ctx.fill(); ctx.restore();
    }
    ctx.fillStyle = 'rgba(255,255,255,.7)';
    ctx.beginPath(); ctx.arc(0,0,s*.14,0,Math.PI*2); ctx.fill();
  }

  function hexA(hex, a) {
    const r = parseInt(hex.slice(1,3),16),
          g = parseInt(hex.slice(3,5),16),
          b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  // ── SPARKLE SYSTEM (lightweight pool) ──
  const sparks = [];
  function addSparks(x, y, pal) {
    for (let i = 0; i < 10; i++) {
      const a = Math.random()*Math.PI*2;
      const sp = rand(1.5, 3.5);
      sparks.push({
        x, y,
        vx: Math.cos(a) * rand(1.5, 4.5),
        vy: Math.sin(a) * rand(1.5, 4.5) - rand(1, 3),
        r: rand(1.5, 3.5), color: pal.m,
        life: 1, decay: rand(.02, .045)
      });
    }
  }

  // ── RIPPLE SYSTEM ──
  const ripples = [];
  function addRipple(x, y) {
    ripples.push({ x, y, r: 0, maxR: 55, life: 1 });
  }

  // ── GRASS LAYER (drawn once, composited over flowers) ──
  let grassCanvas = document.createElement('canvas');
  let grassCtx = grassCanvas.getContext('2d');
  function buildGrass() {
    grassCanvas.width = W; grassCanvas.height = H;
    const gBase = H * .72;
    for (let i = 0; i < W * .8; i += 2) {
      const x = Math.random() * W;
      const h = rand(6, 22);
      const leanX = (Math.random()-.5)*6;
      grassCtx.strokeStyle = `rgba(${40+Math.random()*30},${90+Math.random()*40},${40+Math.random()*20},${.35+Math.random()*.4})`;
      grassCtx.lineWidth = .8;
      grassCtx.beginPath();
      grassCtx.moveTo(x, gBase + rand(0,H*.25));
      grassCtx.quadraticCurveTo(x+leanX*.5, gBase-h*.5, x+leanX, gBase-h);
      grassCtx.stroke();
    }
  }
  buildGrass();

  // ── SPAWN AMBIENT FLOWERS ──
  function spawnAmbient() {
    const n = Math.min(22, Math.floor(W / 50));
    for (let i = 0; i < n; i++) {
      setTimeout(() => {
        const x = rand(W*.04, W*.96);
        const y = rand(H*.72, H*.95);
        spawnFlower(x, y, { size: rand(10,22), stemH: rand(20,55), maxAge: 99999, type: Math.floor(Math.random()*4) });
      }, i * 220);
    }
  }
  spawnAmbient();

  // ── INPUT ──
  let lastTap = 0;
  function onInput(x, y) {
    const now = Date.now();
    if (now - lastTap < 80) return;
    lastTap = now;
    const n = Math.floor(rand(2,4));
    const palette = PALETTES[Math.floor(Math.random()*PALETTES.length)];
    for (let i = 0; i < n; i++) {
      const ox = (Math.random()-.5)*60, oy = Math.random()*24;
      spawnFlower(x+ox, y+oy, {
        size: rand(22, 44),
        stemH: rand(30, 80),
        type: Math.floor(Math.random()*4),
        maxAge: rand(340, 650),
        pal: palette
      });
    }
    addSparks(x, y, palette);
    addRipple(x, y);
    bloomCount += n;
    bloomEl.textContent = bloomCount;
  }
  cv.addEventListener('pointerdown', e => { e.preventDefault(); onInput(e.clientX, e.clientY); });
  cv.addEventListener('pointermove', e => {
    if (e.buttons === 0) return;
    e.preventDefault();
    if (Math.random() < .2) onInput(e.clientX, e.clientY);
  });

  // ── MOON ──
  let moonPulse = 0;
  function drawMoon() {
    moonPulse += .008;
    const mx = W * .82, my = H * .1;
    const mg = ctx.createRadialGradient(mx,my,0,mx,my,H*.22);
    mg.addColorStop(0, `rgba(255,240,220,${.08 + .02*Math.sin(moonPulse)})`);
    mg.addColorStop(1, 'transparent');
    ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(mx,my,H*.22,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fef9f0'; ctx.globalAlpha = .9;
    ctx.beginPath(); ctx.arc(mx,my,22,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f9f0e0'; ctx.globalAlpha = .6;
    ctx.beginPath(); ctx.arc(mx-5,my+3,18,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // ── TWINKLE STARS animation ──
  const tStars = [];
  for (let i = 0; i < 40; i++) tStars.push({ x: Math.random()*1, y: Math.random()*.65, phase: Math.random()*Math.PI*2, speed: rand(.015,.04), r: rand(.3,1.2) });
  let tFrame = 0;
  function drawTwinkles() {
    tFrame++;
    if (tFrame % 2 !== 0) return; // update every other frame
    for (const s of tStars) {
      s.phase += s.speed;
      const a = (.15 + .55 * Math.abs(Math.sin(s.phase)));
      ctx.globalAlpha = a;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ── MAIN LOOP ──
  let last = 0;
  function loop(ts) {
    raf = requestAnimationFrame(loop);
    const dt = ts - last; last = ts;
    // throttle to ~60fps
    if (dt < 8) return;

    // draw static bg
    ctx.drawImage(bgCanvas, 0, 0, W, H);

    // moon
    drawMoon();
    drawTwinkles();

    // update & draw flowers
    live = live.filter(f => {
      if (!f.alive) return false;
      f.sway += f.swaySpeed;
      f.rot += f.rotSpeed;
      f.age++;
      if (f.state === 'grow') {
        f.size += (f.maxSize - f.size) * f.growSpeed;
        f.alpha = Math.min(1, f.alpha + .06);
        if (f.size > f.maxSize * .97) f.state = 'live';
      } else if (f.state === 'live') {
        if (f.age > f.maxAge) f.state = 'fade';
      } else {
        f.alpha -= .012;
        if (f.alpha <= 0) { f.alive = false; return false; }
      }
      drawFlower(f);
      return true;
    });

    // grass overlay
    ctx.drawImage(grassCanvas, 0, 0, W, H);

    // ripples
    for (let i = ripples.length-1; i >= 0; i--) {
      const rp = ripples[i];
      rp.r += 2.2; rp.life -= .028;
      if (rp.life <= 0) { ripples.splice(i,1); continue; }
      ctx.beginPath(); ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(255,107,157,${rp.life * .55})`;
      ctx.lineWidth = 1.5; ctx.stroke();
    }

    // sparks
    for (let i = sparks.length-1; i >= 0; i--) {
      const sp = sparks[i];
      sp.x += sp.vx; sp.y += sp.vy; sp.vy += .12;
      sp.life -= sp.decay;
      if (sp.life <= 0) { sparks.splice(i,1); continue; }
      ctx.globalAlpha = sp.life * .85;
      ctx.fillStyle = sp.color;
      ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.r * sp.life, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  requestAnimationFrame(loop);
}
</script>
</body>
</html>
